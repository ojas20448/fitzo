name: AI Coach Cron

# Triggers the backend's scheduled AI jobs (Render free tier has no cron):
# - Daily insights: every day at 01:00 UTC (06:30 IST) — morning coach note + push
# - Weekly recaps: Mondays at 01:30 UTC (07:00 IST) — last week's summary
#
# Requires repo secret CRON_SECRET matching the CRON_SECRET env var on Render.

on:
  schedule:
    - cron: "0 1 * * *"    # daily insights — 06:30 IST
    - cron: "30 1 * * 1"   # weekly recaps — Mondays 07:00 IST
  workflow_dispatch:
    inputs:
      job:
        description: "Which job to run (daily-insights | weekly-recaps)"
        required: false
        default: "daily-insights"

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Determine job
        id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "endpoint=${{ github.event.inputs.job }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "30 1 * * 1" ]; then
            echo "endpoint=weekly-recaps" >> "$GITHUB_OUTPUT"
          else
            echo "endpoint=daily-insights" >> "$GITHUB_OUTPUT"
          fi

      - name: Wake server
        run: curl -s -m 90 https://fitzo.onrender.com/api/health || true

      - name: Trigger ${{ steps.pick.outputs.endpoint }}
        run: |
          CODE=$(curl -s -o /tmp/resp.txt -w "%{http_code}" -m 60 \
            -X POST "https://fitzo.onrender.com/api/cron/${{ steps.pick.outputs.endpoint }}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}")
          cat /tmp/resp.txt
          if [ "$CODE" != "202" ]; then
            echo "❌ Cron trigger failed with HTTP $CODE"
            exit 1
          fi
          echo "✅ ${{ steps.pick.outputs.endpoint }} batch started"
